<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For My Favorite Human ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#120018,#2b0f4d,#ff4fa3);
color:white;
text-align:center;
padding:40px;
min-height:100vh;
}
h1{
font-family:'Great Vibes',cursive;
font-size:4rem;
}
.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:25px;
max-width:700px;
margin:auto;
backdrop-filter:blur(10px);
}
button{
padding:15px 30px;
border:none;
border-radius:999px;
background:#ff77c8;
color:white;
font-size:1rem;
cursor:pointer;
}
</style>
</head>
<body>
<div class="card">
<h1>For My Favorite Boy ✨</h1>
<p>You’re my favorite notification 💜</p>
<button onclick="showMessage()">Tap Me ✨</button>
<p id="msg"></p>
</div>

<script>
const messages = [
"Missing you 💭",
"You feel like home 🌙",
"You’re my favorite kind of magic ✨",
"I hope you know how special you are 💜"
];

function showMessage(){
const random = messages[Math.floor(Math.random()*messages.length)];
document.getElementById("msg").innerText = random;
}
</script>
</body>
</html>
